services:
  - type: web
    name: eth-ema-alert
    runtime: python
    repo: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME.git
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn_config.py web_app:app
    plan: free
    numInstances: 1
    healthCheckPath: /
    autoDeploy: yes
    envVars:
      - key: PORT
        value: 10000
