<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETH EMA 预警仪表盘</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <!-- 顶部导航 -->
    <nav class="nav">
      <span class="nav-logo">📊 ETH EMA 预警</span>
      <div class="nav-links">
        <a href="/" class="nav-link active">仪表盘</a>
        <a href="/settings" class="nav-link">设置</a>
        <a href="/history" class="nav-link">历史</a>
      </div>
      <span class="nav-status" id="conn-status-mini">正在连接...</span>
    </nav>

    <!-- 价格区 -->
    <div class="card price-card">
      <div class="price-label">ETH / USDT 实时价格</div>
      <div class="price-value" id="current-price">
        <span class="loading-dots">正在获取数据...</span>
      </div>
      <div class="price-sub" id="price-sub">
        <span>等待数据更新...</span>
      </div>
    </div>

    <!-- 信息栏 -->
    <div class="info-bar">
      <span>状态: <span id="conn-status">正在连接...</span></span>
      <span>下次刷新: <span class="refresh-countdown" id="refresh-countdown">30</span> 秒</span>
      <span id="fixed-push-info"></span>
      <span class="source-detail" onclick="loadState()">🔄 立即刷新</span>
    </div>

    <!-- 各周期状态 -->
    <div class="card">
      <div class="section-title">各周期状态</div>
      <div class="tf-grid">
        <div class="tf-card tf-mini active" data-tf="5m" onclick="selectTf('5m')">
          <div class="tf-label">5分钟</div>
        </div>
        <div class="tf-card tf-mini" data-tf="15m" onclick="selectTf('15m')">
          <div class="tf-label">15分钟</div>
        </div>
        <div class="tf-card tf-mini" data-tf="30m" onclick="selectTf('30m')">
          <div class="tf-label">30分钟</div>
        </div>
        <div class="tf-card tf-mini" data-tf="1h" onclick="selectTf('1h')">
          <div class="tf-label">1小时</div>
        </div>
        <div class="tf-card tf-mini" data-tf="4h" onclick="selectTf('4h')">
          <div class="tf-label">4小时</div>
        </div>
      </div>

      <!-- EMA 详情区（显示选中周期的 EMA/价格/距离中心） -->
      <div class="ema-detail" id="ema-detail">
        <div class="ema-detail-title" id="ema-detail-title">5分钟 · EMA 区间</div>
        <div class="ema-detail-body">
          <!-- 两个醒目的 EMA 卡片 -->
          <div class="ema-value-cards">
            <div class="ema-card">
              <div class="ema-card-label" id="ema-short-label">EMA 180</div>
              <div class="ema-card-value" id="ema-short-value">--</div>
            </div>
            <div class="ema-card ema-card-250">
              <div class="ema-card-label" id="ema-long-label">EMA 250</div>
              <div class="ema-card-value" id="ema-long-value">--</div>
            </div>
          </div>
          <div class="ema-detail-divider"></div>
          <div class="ema-detail-row">
            <span class="ema-detail-label">当前价格</span>
            <span class="ema-detail-value" id="ema-price">--</span>
          </div>
          <div class="ema-detail-row">
            <span class="ema-detail-label">离区间中心</span>
            <span class="ema-detail-value" id="ema-distance">--</span>
          </div>
          <div class="ema-detail-row">
            <span class="ema-detail-label">数据源</span>
            <span class="ema-detail-value" id="ema-source">--</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 价格区间管理 -->
    <div class="card">
      <div class="section-title">
        <span>价格区间预警</span>
        <button class="btn-primary" id="btn-add-range" onclick="showAddRange()">+ 添加区间</button>
      </div>
      <div id="range-list" class="range-list">
        <div class="range-empty">暂无价格区间，点击右上角「+ 添加区间」</div>
      </div>
    </div>

    <!-- 添加区间弹窗 -->
    <div class="modal" id="modal-range" style="display:none;">
      <div class="modal-content">
        <div class="section-title">添加价格区间</div>
        <div class="form-row">
          <label>名称（可选）</label>
          <input type="text" id="range-name" placeholder="如 震荡区间">
        </div>
        <div class="form-row">
          <label>下限 (USDT)</label>
          <input type="number" id="range-low" placeholder="如 1600" step="0.01">
        </div>
        <div class="form-row">
          <label>上限 (USDT)</label>
          <input type="number" id="range-high" placeholder="如 1700" step="0.01">
        </div>
        <div class="form-row">
          <label style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="range-enabled" checked> 立即启用
          </label>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="hideAddRange()">取消</button>
          <button class="btn-primary" onclick="submitAddRange()">保存</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>数据来源: Gate.io / OKX</span>
      <span id="last-update-text">等待数据更新...</span>
    </div>
  </div>

<script>
let _countdown = 30;
let _prevPrice = null;
let _tickTimer = null;
let _selectedTf = '5m';
let _lastState = null;
let _tfNameMap = { '5m': '5分钟', '15m': '15分钟', '30m': '30分钟', '1h': '1小时', '4h': '4小时' };

function formatNumber(n, d) {
  if (n == null || isNaN(n)) return '--';
  return Number(n).toLocaleString('zh-CN', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function updateCountdown() {
  const el = document.getElementById('refresh-countdown');
  if (el) el.textContent = _countdown;
}

// ====== 点击切换周期 ======
function selectTf(tf) {
  _selectedTf = tf;
  // 更新 active 高亮
  document.querySelectorAll('.tf-mini').forEach(el => {
    if (el.dataset.tf === tf) el.classList.add('active');
    else el.classList.remove('active');
  });
  // 立刻用已有数据刷新 EMA 详情区
  if (_lastState) renderEmaDetail(_lastState);
}

// ====== 渲染 EMA 详情区 ======
function renderEmaDetail(d) {
  const states = d.states || {};
  const cfg = d.config || {};
  const esVal = (cfg.ema_alert && cfg.ema_alert.ema_short) || 180;
  const elVal = (cfg.ema_alert && cfg.ema_alert.ema_long) || 250;

  const titleEl = document.getElementById('ema-detail-title');
  if (titleEl) titleEl.textContent = (_tfNameMap[_selectedTf] || _selectedTf) + ' · EMA 区间';

  const s = states[_selectedTf];
  const shortEl = document.getElementById('ema-short-value');
  const longEl = document.getElementById('ema-long-value');
  const priceEl = document.getElementById('ema-price');
  const distEl = document.getElementById('ema-distance');
  const sourceEl = document.getElementById('ema-source');
  const shortLabel = document.getElementById('ema-short-label');
  const longLabel = document.getElementById('ema-long-label');

  if (shortLabel) shortLabel.textContent = 'EMA ' + esVal;
  if (longLabel) longLabel.textContent = 'EMA ' + elVal;

  if (s) {
    if (shortEl) shortEl.textContent = '$' + formatNumber(s.ema_short, 2);
    if (longEl) longEl.textContent = '$' + formatNumber(s.ema_long, 2);
    if (priceEl) priceEl.textContent = '$' + formatNumber(s.price, 2);

    // 离 EMA 区间中心距离
    const center = (Number(s.ema_short) + Number(s.ema_long)) / 2;
    const dist = Number(s.price) - center;
    if (distEl) {
      const sign = dist >= 0 ? '+' : '';
      distEl.textContent = sign + '$' + formatNumber(dist, 2) + '  （中心 $' + formatNumber(center, 2) + '）';
      distEl.style.color = dist >= 0 ? '#22c55e' : '#f43f5e';
    }
    if (sourceEl) sourceEl.textContent = s.data_source || 'gateio';
  } else {
    if (shortEl) shortEl.textContent = '--';
    if (longEl) longEl.textContent = '--';
    if (priceEl) priceEl.textContent = '--';
    if (distEl) { distEl.textContent = '--'; distEl.style.color = '#fff'; }
    if (sourceEl) sourceEl.textContent = '--';
  }
}

// ====== 核心：请求状态 ======
function loadState() {
  _countdown = 30;
  updateCountdown();
  fetch('/api/state', { cache: 'no-store' })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        showError(data.error);
        return;
      }
      renderDashboard(data);
    })
    .catch(err => {
      const el = document.getElementById('conn-status');
      if (el) {
        el.textContent = '网络异常，重试中...';
        el.style.color = '#f87171';
      }
      // 出错后缩短下次刷新时间
      _countdown = 8;
      updateCountdown();
    });
}

function showError(msg) {
  const el = document.getElementById('conn-status');
  if (el) {
    el.textContent = msg || '接口异常';
    el.style.color = '#f87171';
  }
}

// ====== 渲染 ======
function renderDashboard(d) {
  const states = d.states || {};
  const hasData = d.has_data;

  // 连接状态
  const connEl = document.getElementById('conn-status');
  if (connEl) {
    connEl.textContent = d.status || '未知';
    connEl.style.color = (d.status === '已连接') ? '#4ade80' : (d.status === '连接稍慢' ? '#fbbf24' : '#f87171');
  }
  const miniEl = document.getElementById('conn-status-mini');
  if (miniEl) {
    miniEl.textContent = '● ' + (d.status || '未知');
    miniEl.style.color = (d.status === '已连接') ? '#4ade80' : (d.status === '连接稍慢' ? '#fbbf24' : '#f87171');
  }

  // 价格
  const priceEl = document.getElementById('current-price');
  const priceSubEl = document.getElementById('price-sub');
  if (hasData && d.latest_price) {
    priceEl.innerHTML = '<span>$' + formatNumber(d.latest_price, 2) + '</span>';
    // 涨跌高亮
    if (_prevPrice !== null) {
      const diff = d.latest_price - _prevPrice;
      if (Math.abs(diff) > 0.01) {
        const inner = priceEl.querySelector('span');
        if (inner) {
          inner.classList.add(diff > 0 ? 'price-up' : 'price-down');
          setTimeout(() => inner.classList.remove('price-up', 'price-down'), 1800);
        }
      }
    }
    _prevPrice = d.latest_price;

    let sub = '';
    if (d.data_age_sec != null && d.data_age_sec < 999999) {
      sub = '<span>数据更新于 ' + d.data_age_sec + ' 秒前</span>';
    } else if (d.update_time_str) {
      sub = '<span>更新时间: ' + d.update_time_str + '</span>';
    } else {
      sub = '<span>正在获取交易所数据...</span>';
    }
    priceSubEl.innerHTML = sub;
  } else {
    priceEl.innerHTML = '<span class="loading-dots">正在获取数据...</span>';
    priceSubEl.innerHTML = '<span>首次从交易所获取数据，可能需要几秒...</span>';
    _prevPrice = null;
  }

  // 底部更新时间
  const lut = document.getElementById('last-update-text');
  if (lut) {
    if (d.update_time_str) lut.textContent = '最后更新: ' + d.update_time_str;
    else lut.textContent = '等待数据更新...';
  }

  // 下一次固定时间点推送
  const fixedEl = document.getElementById('fixed-push-info');
  if (fixedEl) {
    const fixed = d.fixed_push_interval || 0;
    if (fixed > 0 && d.next_fixed_push_time) {
      let intervalText;
      const minutes = fixed / 60;
      if (minutes >= 60) intervalText = (minutes / 60) + '小时';
      else intervalText = minutes + '分钟';
      fixedEl.innerHTML = '· 下次播报 ' + d.next_fixed_push_time + '（每' + intervalText + '）';
    } else {
      fixedEl.textContent = '';
    }
  }

  // 缓存最新数据（供点击切换周期时直接复用）
  _lastState = d;

  // EMA 详情区：显示选中周期的 EMA/价格/离中心距离
  renderEmaDetail(d);

  // 价格区间列表
  renderPriceRanges(d.price_ranges || []);
}

function renderPriceRanges(list) {
  const c = document.getElementById('range-list');
  if (!list || list.length === 0) {
    c.innerHTML = '<div class="range-empty">暂无价格区间，点击右上角「+ 添加区间」</div>';
    return;
  }
  let html = '';
  for (let i = 0; i < list.length; i++) {
    const r = list[i];
    const enabledCls = r.enabled ? 'range-item' : 'range-item range-disabled';
    html += '<div class="' + enabledCls + '">' +
            '<div class="range-info">' +
              '<div class="range-name">' + (r.name || ('区间 ' + (i + 1))) + '</div>' +
              '<div class="range-values">价格 $' + formatNumber(r.low, 2) + ' ~ $' + formatNumber(r.high, 2) + '</div>' +
              '<div class="range-band">缓冲带: $' + formatNumber(parseFloat(r.low) - 10, 2) + ' ~ $' + formatNumber(parseFloat(r.high) + 10, 2) + '</div>' +
            '</div>' +
            '<div class="range-actions">' +
              '<button class="btn-toggle" onclick="toggleRange(' + i + ')">' + (r.enabled ? '已启用' : '已禁用') + '</button>' +
              '<button class="btn-delete" onclick="deleteRange(' + i + ')">删除</button>' +
            '</div></div>';
  }
  c.innerHTML = html;
}

// ====== 价格区间操作 ======
function showAddRange() { document.getElementById('modal-range').style.display = 'flex'; }
function hideAddRange() { document.getElementById('modal-range').style.display = 'none'; }
function submitAddRange() {
  const low = parseFloat(document.getElementById('range-low').value);
  const high = parseFloat(document.getElementById('range-high').value);
  const name = document.getElementById('range-name').value.trim();
  const enabled = document.getElementById('range-enabled').checked;
  if (!low || !high || low >= high) { alert('请填写正确的价格区间（下限 < 上限）'); return; }
  fetch('/api/save_price_range', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ low, high, name, enabled })
  }).then(r => r.json()).then(d => {
    if (d.success) {
      hideAddRange();
      renderPriceRanges(d.price_ranges || []);
      document.getElementById('range-low').value = '';
      document.getElementById('range-high').value = '';
      document.getElementById('range-name').value = '';
    } else alert('保存失败: ' + (d.error || '未知错误'));
  }).catch(e => alert('请求失败: ' + e));
}
function toggleRange(idx) {
  fetch('/api/toggle_price_range', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: idx })
  }).then(r => r.json()).then(d => {
    if (d.success) renderPriceRanges(d.price_ranges || []);
    else alert('操作失败: ' + (d.error || '未知错误'));
  }).catch(e => alert('请求失败: ' + e));
}
function deleteRange(idx) {
  if (!confirm('确认删除该价格区间？')) return;
  fetch('/api/delete_price_range', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: idx })
  }).then(r => r.json()).then(d => {
    if (d.success) renderPriceRanges(d.price_ranges || []);
    else alert('删除失败: ' + (d.error || '未知错误'));
  }).catch(e => alert('请求失败: ' + e));
}

// ====== 倒计时 & 自动刷新 ======
function startTick() {
  if (_tickTimer) clearInterval(_tickTimer);
  _tickTimer = setInterval(() => {
    _countdown -= 1;
    if (_countdown <= 0) {
      loadState();  // 自动刷新
    } else {
      updateCountdown();
    }
  }, 1000);
}

// 启动
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  startTick();
});
</script>
</body>
</html>
